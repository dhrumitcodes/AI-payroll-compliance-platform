version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: payroll-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payroll_db
      POSTGRES_USER: payroll_admin
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: